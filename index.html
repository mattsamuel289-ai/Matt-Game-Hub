<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
  color:#333;
}

/* Navigation */
nav{
  background:#222;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
}

nav img{
  vertical-align:middle;
  border-radius:6px;
}

nav strong{
  color:white;
  font-size:20px;
  margin-left:8px;
  vertical-align:middle;
}

nav a{
  color:white;
  margin:15px;
  text-decoration:none;
  font-size:18px;
  padding:6px 10px;
}

nav a:hover{
  background:#4CAF50;
  border-radius:5px;
}

/* Header */
header{
  background:#4CAF50;
  color:white;
  padding:50px 20px;
  text-align:center;
}

/* Sections */
section{
  padding:40px 20px;
  text-align:center;
}

/* Game Cards */
.game-card{
  background:white;
  width:220px;
  display:inline-block;
  margin:15px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

.game-card:hover{
  transform:scale(1.05);
}

.game-card img{
  width:100%;
  border-radius:8px;
}

/* Buttons */
button{
  padding:10px 20px;
  margin-top:10px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* Ad space */
.ad-box{
  margin:30px;
  padding:20px;
  background:#ddd;
  border-radius:8px;
}

/* Footer */
footer{
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
}

footer a{
  color:#4CAF50;
  text-decoration:none;
}
</style>

</head>
